<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Car Dodger</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0f1a;
  --surface: rgba(20, 20, 40, 0.92);
  --text: #e8e8f0;
  --accent: #00d4ff;
  --danger: #ff4757;
  --gold: #ffd700;
  --btn-gradient: linear-gradient(135deg, #00d4ff, #0099cc);
  --btn-hover: linear-gradient(135deg, #00e5ff, #00aadd);
}

body {
  background: var(--bg);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  min-height: 100dvh;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
}

#game-wrapper {
  position: relative;
  width: 100%;
  max-width: 460px;
  height: 100vh;
  height: 100dvh;
  max-height: 860px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

#game-container {
  position: relative;
  width: 100%;
  height: 100%;
  overflow: hidden;
  border-radius: 16px;
  box-shadow: 0 0 60px rgba(0, 212, 255, 0.12), 0 0 0 1px rgba(255,255,255,0.06);
}

canvas {
  display: block;
  width: 100%;
  height: 100%;
}

/* General hidden */
.hidden, .hidden-mobile { display: none !important; }

/* But the overlay uses opacity for fade transitions */
.overlay.hidden { display: flex !important; opacity: 0; visibility: hidden; pointer-events: none; }

/* Overlays */
.overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  background: rgba(10, 10, 26, 0.85);
  transition: opacity 0.35s ease, visibility 0.35s ease;
}
.overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

/* Start Screen */
#start-screen .logo-car {
  font-size: 64px;
  margin-bottom: 8px;
  animation: float 2.5s ease-in-out infinite;
  filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.5));
}
#start-screen h1 {
  font-size: 2.6em;
  font-weight: 800;
  background: linear-gradient(135deg, #00d4ff, #7c3aed, #ff4757);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -1px;
  margin-bottom: 4px;
}
#start-screen .subtitle {
  color: rgba(255,255,255,0.5);
  font-size: 0.9em;
  margin-bottom: 36px;
  letter-spacing: 2px;
  text-transform: uppercase;
}
#start-screen .best-label {
  color: rgba(255,255,255,0.5);
  font-size: 0.8em;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 4px;
}
#start-screen .best-value {
  color: var(--gold);
  font-size: 1.3em;
  font-weight: 700;
  margin-bottom: 28px;
}

/* Game Over Screen */
#gameover-screen h2 {
  font-size: 2.8em;
  font-weight: 900;
  color: var(--danger);
  text-shadow: 0 0 30px rgba(255, 71, 87, 0.6);
  animation: shakeIn 0.5s ease-out;
  margin-bottom: 20px;
}
#gameover-screen .final-score {
  font-size: 1.2em;
  color: var(--text);
  margin-bottom: 4px;
}
#gameover-screen .final-score span {
  font-size: 2.4em;
  font-weight: 800;
  color: #fff;
  display: block;
  margin-top: 2px;
}
#gameover-screen .new-best {
  color: var(--gold);
  font-weight: 700;
  font-size: 1.1em;
  margin-bottom: 20px;
  animation: pulse 1s ease-in-out infinite;
}

/* Pause Screen */
#pause-screen h2 {
  font-size: 2.4em;
  font-weight: 800;
  color: #fff;
  margin-bottom: 24px;
  letter-spacing: 4px;
}

/* Buttons */
.btn {
  padding: 14px 48px;
  font-size: 1.15em;
  font-weight: 700;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  font-family: inherit;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: transform 0.15s ease, box-shadow 0.2s ease, opacity 0.2s ease;
  position: relative;
  overflow: hidden;
}
.btn:active { transform: scale(0.95); }
.btn-play {
  background: var(--btn-gradient);
  color: #fff;
  box-shadow: 0 6px 24px rgba(0, 212, 255, 0.35);
  font-size: 1.3em;
  padding: 16px 56px;
  animation: pulseBtn 2s ease-in-out infinite;
}
.btn-play:hover { box-shadow: 0 8px 32px rgba(0, 212, 255, 0.5); }
.btn-again {
  background: var(--btn-gradient);
  color: #fff;
  box-shadow: 0 6px 24px rgba(0, 212, 255, 0.3);
}
.btn-resume {
  background: rgba(255,255,255,0.1);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.2);
}

/* HUD */
#hud {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  z-index: 5;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 14px 16px;
  pointer-events: none;
}
#hud > * { pointer-events: auto; }

.score-panel {
  background: var(--surface);
  border-radius: 14px;
  padding: 8px 16px;
  border: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.score-panel .score-label {
  font-size: 0.65em;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: rgba(255,255,255,0.5);
}
.score-panel .score-value {
  font-size: 1.5em;
  font-weight: 800;
  color: #fff;
  line-height: 1.1;
}
.score-panel .best-row {
  font-size: 0.7em;
  color: var(--gold);
  margin-top: 2px;
}

.hud-buttons {
  display: flex;
  gap: 8px;
}
.icon-btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.1);
  background: var(--surface);
  color: #fff;
  font-size: 1.1em;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  transition: background 0.2s, transform 0.15s;
}
.icon-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.15); }

/* Mobile Controls */
#mobile-controls {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 6;
  display: flex;
  justify-content: space-between;
  padding: 12px 16px 20px;
  pointer-events: none;
}
#mobile-controls.hidden-mobile { display: none; }
.mobile-arrow {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  border: 2px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.7);
  font-size: 2em;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: auto;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.1s, border-color 0.1s;
  user-select: none;
  -webkit-user-select: none;
}
.mobile-arrow:active, .mobile-arrow.pressed {
  background: rgba(0, 212, 255, 0.25);
  border-color: rgba(0, 212, 255, 0.5);
}

/* Animations */
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
@keyframes pulseBtn {
  0%, 100% { box-shadow: 0 6px 24px rgba(0, 212, 255, 0.35); }
  50% { box-shadow: 0 8px 36px rgba(0, 212, 255, 0.55); }
}
@keyframes shakeIn {
  0% { transform: translateX(-8px); opacity: 0; }
  15% { transform: translateX(8px); }
  30% { transform: translateX(-6px); }
  45% { transform: translateX(6px); }
  60% { transform: translateX(-3px); }
  75% { transform: translateX(3px); }
  90% { transform: translateX(-1px); }
  100% { transform: translateX(0); opacity: 1; }
}

/* Responsive */
@media (max-width: 480px) {
  #game-wrapper { max-width: 100%; border-radius: 0; }
  #game-container { border-radius: 0; }
  #start-screen h1 { font-size: 2em; }
  #gameover-screen h2 { font-size: 2.2em; }
  .btn { padding: 12px 36px; font-size: 1em; }
  .btn-play { padding: 14px 44px; font-size: 1.1em; }
  .mobile-arrow { width: 56px; height: 56px; font-size: 1.6em; }
}
@media (min-width: 1024px) {
  #mobile-controls { display: none; }
}
</style>
</head>
<body>

<div id="game-wrapper">
  <div id="game-container">
    <canvas id="game"></canvas>

    <!-- HUD -->
    <div id="hud" class="hidden">
      <div class="score-panel">
        <div class="score-label">Score</div>
        <div class="score-value" id="score-display">0</div>
        <div class="best-row">🏆 <span id="best-display">0</span></div>
      </div>
      <div class="hud-buttons">
        <button class="icon-btn" id="mute-btn" title="Sound">🔊</button>
        <button class="icon-btn" id="pause-btn" title="Pause">⏸</button>
      </div>
    </div>

    <!-- Start Screen -->
    <div class="overlay" id="start-screen">
      <div class="logo-car">🏎️</div>
      <h1>CAR DODGER</h1>
      <p class="subtitle">Dodge traffic. Collect coins.</p>
      <div class="best-label">Best Score</div>
      <div class="best-value" id="start-best">0</div>
      <button class="btn btn-play" id="play-btn">▶ Play</button>
    </div>

    <!-- Game Over Screen -->
    <div class="overlay hidden" id="gameover-screen">
      <h2>GAME OVER</h2>
      <div class="final-score">Final Score <span id="final-score">0</span></div>
      <div class="new-best hidden" id="new-best">🌟 NEW BEST!</div>
      <button class="btn btn-again" id="again-btn">Play Again</button>
    </div>

    <!-- Pause Screen -->
    <div class="overlay hidden" id="pause-screen">
      <h2>PAUSED</h2>
      <button class="btn btn-resume" id="resume-btn">Resume</button>
    </div>

    <!-- Mobile Controls -->
    <div id="mobile-controls" class="hidden-mobile">
      <div class="mobile-arrow" id="left-arrow">◀</div>
      <div class="mobile-arrow" id="right-arrow">▶</div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  CAR DODGER — Complete Game Engine
// ═══════════════════════════════════════════

// ─── DOM References ────────────────────────
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const startScreen = document.getElementById('start-screen');
const gameoverScreen = document.getElementById('gameover-screen');
const pauseScreen = document.getElementById('pause-screen');
const hud = document.getElementById('hud');
const mobileControls = document.getElementById('mobile-controls');
const scoreDisplay = document.getElementById('score-display');
const bestDisplay = document.getElementById('best-display');
const finalScoreEl = document.getElementById('final-score');
const newBestEl = document.getElementById('new-best');
const startBest = document.getElementById('start-best');
const muteBtn = document.getElementById('mute-btn');

// ─── Audio System ─────────────────────────
let audioCtx = null;
let muted = false;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playCoinSound() {
  if (!audioCtx || muted) return;
  const now = audioCtx.currentTime;
  [523.25, 659.25, 783.99].forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.value = freq;
    const t = now + i * 0.06;
    gain.gain.setValueAtTime(0.12, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    osc.start(t); osc.stop(t + 0.12);
  });
}

function playCrashSound() {
  if (!audioCtx || muted) return;
  const now = audioCtx.currentTime;
  const len = 0.35;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * len, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 2);
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass'; filter.frequency.value = 500;
  src.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
  gain.gain.setValueAtTime(0.25, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + len);
  src.start(now); src.stop(now + len);
}

function playClickSound() {
  if (!audioCtx || muted) return;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = 'sine'; osc.frequency.value = 800;
  gain.gain.setValueAtTime(0.08, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
  osc.start(now); osc.stop(now + 0.05);
}

function toggleMute() {
  muted = !muted;
  muteBtn.textContent = muted ? '🔇' : '🔊';
}

// ─── Game State ───────────────────────────
const STATE = { START: 0, PLAYING: 1, PAUSED: 2, GAMEOVER: 3 };
let gameState = STATE.START;
let score = 0;
let bestScore = 0;
let isNewBest = false;
let enemyBaseSpeed = 0;
let spawnTimer = 0;
let coinSpawnTimer = 0;
let screenShake = 0;
let frameCount = 0;
let lastTime = 0;
let animFrameId = null;

// ─── Game Dimensions (recalculated on resize) ──
let roadLeft, roadRight, roadWidth, laneWidth;
let playerWidth, playerHeight;
let playerSpeed;

const player = { x: 0, y: 0 };
const enemies = [];
const coins = [];
const particles = [];
const bushes = [];

const ENEMY_COLORS = ['#ff4757','#ff6b35','#a855f7','#2ed573','#ffa502','#e91e63','#1abc9c','#f368e0'];
let roadOffset = 0;
let bushOffset = 0;

function updateDimensions() {
  roadLeft = Math.floor(canvas.width * 0.14);
  roadRight = Math.floor(canvas.width * 0.86);
  roadWidth = roadRight - roadLeft;
  laneWidth = roadWidth / 3;
  playerWidth = Math.max(30, roadWidth * 0.17);
  playerHeight = playerWidth * 1.85;
  playerSpeed = canvas.width * 0.7;
  if (gameState === STATE.START) {
    player.x = canvas.width / 2;
  }
  player.x = clamp(player.x, roadLeft + playerWidth/2, roadRight - playerWidth/2);
  player.y = canvas.height * 0.78;
  // Update existing enemies/coins positions relative to new road bounds
  enemies.forEach(e => { e.x = clamp(e.x, roadLeft + e.width/2, roadRight - e.width/2); });
  coins.forEach(c => { c.x = clamp(c.x, roadLeft + c.radius, roadRight - c.radius); });
}

function resizeCanvas() {
  const container = document.getElementById('game-container');
  const maxW = 460;
  const maxH = Math.min(window.innerHeight, 860);
  const ratio = 9 / 16;
  let w = Math.min(container.clientWidth, maxW);
  let h = w / ratio;
  if (h > maxH) { h = maxH; w = h * ratio; }
  canvas.width = Math.floor(w);
  canvas.height = Math.floor(h);
  updateDimensions();
  initBushes();
}

// ─── Particles ────────────────────────────
function spawnParticles(x, y, count, color, spread) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 60 + Math.random() * spread;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.015 + Math.random() * 0.04,
      color,
      size: 2 + Math.random() * 4
    });
  }
}

// ─── Bushes (roadside scenery) ────────────
function initBushes() {
  bushes.length = 0;
  for (let i = 0; i < 12; i++) {
    bushes.push({
      x: Math.random() < 0.5
        ? 4 + Math.random() * (roadLeft - 12)
        : roadRight + 8 + Math.random() * (canvas.width - roadRight - 12),
      y: Math.random() * canvas.height,
      size: 14 + Math.random() * 22,
      hue: 80 + Math.random() * 50
    });
  }
}

// ─── Drawing Helpers ──────────────────────
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return { r, g, b };
}

function lighten(hex, amount) {
  const { r, g, b } = hexToRgb(hex);
  const l = (c) => Math.min(255, Math.floor(c + (255 - c) * amount));
  return `rgb(${l(r)},${l(g)},${l(b)})`;
}

function darken(hex, amount) {
  const { r, g, b } = hexToRgb(hex);
  const d = (c) => Math.max(0, Math.floor(c * (1 - amount)));
  return `rgb(${d(r)},${d(g)},${d(b)})`;
}

function drawRoundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ─── Drawing: Scenery ─────────────────────
function drawGrass() {
  // Left grass
  const g1 = ctx.createLinearGradient(0, 0, roadLeft, 0);
  g1.addColorStop(0, '#1a3a0a');
  g1.addColorStop(1, '#2d5a14');
  ctx.fillStyle = g1;
  ctx.fillRect(0, 0, roadLeft, canvas.height);
  // Right grass
  const g2 = ctx.createLinearGradient(roadRight, 0, canvas.width, 0);
  g2.addColorStop(0, '#2d5a14');
  g2.addColorStop(1, '#1a3a0a');
  ctx.fillStyle = g2;
  ctx.fillRect(roadRight, 0, canvas.width - roadRight, canvas.height);

  // Grass texture stripes
  ctx.fillStyle = 'rgba(255,255,255,0.015)';
  for (let y = (bushOffset % 40); y < canvas.height; y += 40) {
    ctx.fillRect(0, y, roadLeft, 15);
    ctx.fillRect(roadRight, y, canvas.width - roadRight, 15);
  }
}

function drawBushes() {
  bushes.forEach(b => {
    const y = ((b.y + bushOffset) % (canvas.height + 60)) - 30;
    // Trunk
    ctx.fillStyle = '#3d2b1f';
    ctx.fillRect(b.x - 2, y + b.size * 0.5, 4, b.size * 0.5);
    // Canopy
    ctx.fillStyle = `hsl(${b.hue}, 55%, 28%)`;
    ctx.beginPath();
    ctx.arc(b.x, y + b.size * 0.3, b.size * 0.6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = `hsl(${b.hue}, 45%, 34%)`;
    ctx.beginPath();
    ctx.arc(b.x - b.size * 0.2, y + b.size * 0.2, b.size * 0.4, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawRoad() {
  // Asphalt
  const roadGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  roadGrad.addColorStop(0, '#3a3a3a');
  roadGrad.addColorStop(0.5, '#404040');
  roadGrad.addColorStop(1, '#353535');
  ctx.fillStyle = roadGrad;
  ctx.fillRect(roadLeft, 0, roadWidth, canvas.height);

  // Edge lines
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(roadLeft + 2, 0); ctx.lineTo(roadLeft + 2, canvas.height);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(roadRight - 2, 0); ctx.lineTo(roadRight - 2, canvas.height);
  ctx.stroke();

  // Lane dashes (scrolling)
  ctx.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx.lineWidth = 3;
  ctx.setLineDash([canvas.height * 0.055, canvas.height * 0.04]);
  ctx.lineDashOffset = -roadOffset;
  for (let i = 1; i < 3; i++) {
    const lx = roadLeft + laneWidth * i;
    ctx.beginPath();
    ctx.moveTo(lx, 0);
    ctx.lineTo(lx, canvas.height);
    ctx.stroke();
  }
  ctx.setLineDash([]);
}

// ─── Drawing: Cars ────────────────────────
function drawCar(x, y, w, h, color) {
  const cx = x - w / 2;
  const cy = y - h / 2;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  drawRoundRect(cx + 3, cy + 3, w, h, 8);
  ctx.fill();

  // Body
  const bodyGrad = ctx.createLinearGradient(cx, cy, cx + w, cy);
  bodyGrad.addColorStop(0, darken(color, 0.15));
  bodyGrad.addColorStop(0.4, color);
  bodyGrad.addColorStop(0.7, lighten(color, 0.15));
  bodyGrad.addColorStop(1, darken(color, 0.1));
  ctx.fillStyle = bodyGrad;
  drawRoundRect(cx, cy, w, h, 8);
  ctx.fill();

  // Body highlight line
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = 1;
  drawRoundRect(cx + 3, cy + 3, w - 6, h - 6, 6);
  ctx.stroke();

  // Cabin/roof
  const cabinW = w * 0.58;
  const cabinH = h * 0.36;
  const cabinX = cx + (w - cabinW) / 2;
  const cabinY = cy + h * 0.16;
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  drawRoundRect(cabinX, cabinY, cabinW, cabinH, 5);
  ctx.fill();

  // Windshield (front = top of car)
  ctx.fillStyle = 'rgba(135, 206, 235, 0.75)';
  drawRoundRect(cabinX + 4, cabinY + 3, cabinW - 8, cabinH * 0.38, 3);
  ctx.fill();

  // Rear window
  ctx.fillStyle = 'rgba(90, 150, 180, 0.7)';
  drawRoundRect(cabinX + 4, cabinY + cabinH * 0.52, cabinW - 8, cabinH * 0.38, 3);
  ctx.fill();

  // Wheels
  ctx.fillStyle = '#111';
  const wheelW = w * 0.16;
  const wheelH = h * 0.2;
  // Front left
  ctx.fillRect(cx - wheelW * 0.5, cy + h * 0.08, wheelW, wheelH);
  // Front right
  ctx.fillRect(cx + w - wheelW * 0.5, cy + h * 0.08, wheelW, wheelH);
  // Rear left
  ctx.fillRect(cx - wheelW * 0.5, cy + h * 0.72, wheelW, wheelH);
  // Rear right
  ctx.fillRect(cx + w - wheelW * 0.5, cy + h * 0.72, wheelW, wheelH);

  // Wheel rims
  ctx.fillStyle = '#666';
  const rimW = wheelW * 0.4;
  const rimH = wheelH * 0.4;
  ctx.fillRect(cx + wheelW * 0.1, cy + h * 0.13, rimW, rimH);
  ctx.fillRect(cx + w - wheelW * 0.5, cy + h * 0.13, rimW, rimH);
  ctx.fillRect(cx + wheelW * 0.1, cy + h * 0.77, rimW, rimH);
  ctx.fillRect(cx + w - wheelW * 0.5, cy + h * 0.77, rimW, rimH);

  // Headlights
  ctx.fillStyle = '#ffffcc';
  ctx.shadowColor = '#ffffaa';
  ctx.shadowBlur = 5;
  ctx.fillRect(cx + 5, cy + 2, w * 0.18, 5);
  ctx.fillRect(cx + w - 5 - w * 0.18, cy + 2, w * 0.18, 5);
  ctx.shadowBlur = 0;

  // Taillights
  ctx.fillStyle = '#ff3333';
  ctx.fillRect(cx + 5, cy + h - 7, w * 0.18, 5);
  ctx.fillRect(cx + w - 5 - w * 0.18, cy + h - 7, w * 0.18, 5);
}

// ─── Drawing: Coin ────────────────────────
function drawCoin(x, y, r, pulse) {
  const scale = 1 + Math.sin(pulse * 4) * 0.08;

  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);

  // Glow
  ctx.shadowColor = '#ffd700';
  ctx.shadowBlur = 10;

  // Outer
  const grad = ctx.createRadialGradient(-r*0.25, -r*0.25, r*0.1, 0, 0, r);
  grad.addColorStop(0, '#fff8dc');
  grad.addColorStop(0.4, '#ffd700');
  grad.addColorStop(1, '#b8860b');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fill();

  ctx.shadowBlur = 0;

  // Dollar sign
  ctx.fillStyle = '#8b6914';
  ctx.font = `bold ${r * 1.1}px "Segoe UI", sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('$', 0, 1);

  ctx.restore();
}

// ─── Drawing: Particles ───────────────────
function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// ─── Spawning ─────────────────────────────
function spawnEnemy() {
  const lane = Math.floor(Math.random() * 3);
  const x = roadLeft + laneWidth * lane + laneWidth / 2;
  const w = playerWidth * (0.75 + Math.random() * 0.35);
  const h = w * 1.85;
  const color = ENEMY_COLORS[Math.floor(Math.random() * ENEMY_COLORS.length)];
  enemies.push({
    x, y: -h,
    width: w, height: h,
    color,
    speed: enemyBaseSpeed * (0.75 + Math.random() * 0.5)
  });
}

function spawnCoin() {
  let x;
  let attempts = 0;
  do {
    x = roadLeft + 20 + Math.random() * (roadWidth - 40);
    attempts++;
  } while (attempts < 10 && enemies.some(e =>
    Math.abs(e.x - x) < playerWidth * 1.2 && e.y < 80 && e.y > -80
  ));

  coins.push({
    x, y: -20,
    radius: Math.max(8, playerWidth * 0.18),
    pulse: Math.random() * Math.PI * 2
  });
}

// ─── Update ───────────────────────────────
function update(dt) {
  if (gameState !== STATE.PLAYING) return;

  // Difficulty scaling
  const elapsed = score * 0.015;
  enemyBaseSpeed = canvas.height * (0.35 + elapsed * 0.025);
  if (enemyBaseSpeed > canvas.height * 1.3) enemyBaseSpeed = canvas.height * 1.3;

  const spawnInterval = Math.max(0.4, 1.5 - elapsed * 0.04);
  const coinInterval = 1.5 + Math.random() * 2.5;

  // Score from distance
  score += enemyBaseSpeed * dt * 0.012;

  // Spawn enemies
  spawnTimer += dt;
  if (spawnTimer >= spawnInterval) {
    spawnTimer = 0;
    spawnEnemy();
    // Occasionally spawn double
    if (Math.random() < 0.2 + elapsed * 0.02) spawnEnemy();
  }

  // Spawn coins
  coinSpawnTimer += dt;
  if (coinSpawnTimer >= coinInterval) {
    coinSpawnTimer = 0;
    if (Math.random() < 0.65) spawnCoin();
  }

  // Scroll road
  roadOffset += enemyBaseSpeed * dt;
  bushOffset += enemyBaseSpeed * dt * 0.8;

  // Update enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.y += e.speed * dt;
    if (e.y > canvas.height + e.height) {
      enemies.splice(i, 1);
    }
  }

  // Update coins
  for (let i = coins.length - 1; i >= 0; i--) {
    const c = coins[i];
    c.y += enemyBaseSpeed * dt;
    c.pulse += dt;
    if (c.y > canvas.height + c.radius) {
      coins.splice(i, 1);
      continue;
    }
    // Coin collection
    const dx = Math.abs(c.x - player.x);
    const dy = Math.abs(c.y - player.y);
    if (dx < (playerWidth / 2 + c.radius - 2) && dy < (playerHeight / 2 + c.radius - 2)) {
      score += 10;
      playCoinSound();
      spawnParticles(c.x, c.y, 12, '#ffd700', 120);
      coins.splice(i, 1);
    }
  }

  // Collision detection
  for (const e of enemies) {
    const dx = Math.abs(e.x - player.x);
    const dy = Math.abs(e.y - player.y);
    const marginX = (playerWidth + e.width) / 2 - 8;
    const marginY = (playerHeight + e.height) / 2 - 10;
    if (dx < marginX && dy < marginY) {
      triggerGameOver();
      return;
    }
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Screen shake decay
  if (screenShake > 0) screenShake = Math.max(0, screenShake - dt * 2.5);

  // Update display
  scoreDisplay.textContent = Math.floor(score);
}

// ─── Player Movement ──────────────────────
const keys = {};
function movePlayer(dt) {
  if (gameState !== STATE.PLAYING) return;
  let dx = 0;
  if (keys['ArrowLeft'] || keys['KeyA']) dx = -1;
  if (keys['ArrowRight'] || keys['KeyD']) dx = 1;

  // Touch direction
  if (touchDir !== 0) dx = touchDir;

  player.x += dx * playerSpeed * dt;
  player.x = clamp(player.x, roadLeft + playerWidth / 2, roadRight - playerWidth / 2);
}

// ─── Game Over ────────────────────────────
function triggerGameOver() {
  gameState = STATE.GAMEOVER;
  playCrashSound();
  screenShake = 0.4;
  spawnParticles(player.x, player.y, 30, '#ff4757', 200);
  spawnParticles(player.x, player.y, 15, '#ffa502', 160);

  const finalScore = Math.floor(score);
  if (finalScore > bestScore) {
    bestScore = finalScore;
    isNewBest = true;
    try { localStorage.setItem('carDodgerBest', bestScore); } catch(e) {}
  }

  setTimeout(() => {
    finalScoreEl.textContent = finalScore;
    if (isNewBest) newBestEl.classList.remove('hidden');
    else newBestEl.classList.add('hidden');
    bestDisplay.textContent = bestScore;
    startBest.textContent = bestScore;
    gameoverScreen.classList.remove('hidden');
    hud.classList.add('hidden');
  }, 500);
}

function resetGame() {
  enemies.length = 0;
  coins.length = 0;
  particles.length = 0;
  score = 0;
  isNewBest = false;
  enemyBaseSpeed = canvas.height * 0.35;
  spawnTimer = 0;
  coinSpawnTimer = 0;
  screenShake = 0;
  roadOffset = 0;
  bushOffset = 0;
  player.x = canvas.width / 2;
  scoreDisplay.textContent = '0';
  bestDisplay.textContent = bestScore;
  startBest.textContent = bestScore;
}

function startGame() {
  initAudio();
  resetGame();
  gameState = STATE.PLAYING;
  startScreen.classList.add('hidden');
  gameoverScreen.classList.add('hidden');
  pauseScreen.classList.add('hidden');
  hud.classList.remove('hidden');
  if (window.innerWidth < 1024) mobileControls.classList.remove('hidden-mobile');
}

function pauseGame() {
  if (gameState !== STATE.PLAYING) return;
  gameState = STATE.PAUSED;
  pauseScreen.classList.remove('hidden');
}

function resumeGame() {
  if (gameState !== STATE.PAUSED) return;
  gameState = STATE.PLAYING;
  pauseScreen.classList.add('hidden');
  lastTime = performance.now();
}

// ─── Render ───────────────────────────────
function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  // Screen shake
  if (screenShake > 0) {
    const intensity = screenShake * 10;
    const sx = (Math.random() - 0.5) * intensity * 2;
    const sy = (Math.random() - 0.5) * intensity * 2;
    ctx.translate(sx, sy);
  }

  // Background / sky
  const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  skyGrad.addColorStop(0, '#0a0a1e');
  skyGrad.addColorStop(1, '#1a1a2e');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawGrass();
  drawBushes();
  drawRoad();

  // Coins
  coins.forEach(c => drawCoin(c.x, c.y, c.radius, c.pulse));

  // Enemy cars
  enemies.forEach(e => drawCar(e.x, e.y, e.width, e.height, e.color));

  // Player car (only when playing/paused/gameover)
  if (gameState !== STATE.START) {
    drawCar(player.x, player.y, playerWidth, playerHeight, '#00d4ff');
  }

  drawParticles();

  ctx.restore();
}

// ─── Game Loop ────────────────────────────
function gameLoop(timestamp) {
  animFrameId = requestAnimationFrame(gameLoop);

  if (lastTime === 0) lastTime = timestamp;
  let dt = (timestamp - lastTime) / 1000;
  lastTime = timestamp;

  // Cap dt to prevent huge jumps
  if (dt > 0.15) dt = 0.15;

  movePlayer(dt);
  update(dt);
  render();
}

// ─── Input Handling ───────────────────────
let touchDir = 0;

document.addEventListener('keydown', e => {
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','KeyA','KeyD','Space','KeyP','Escape'].includes(e.code)) {
    e.preventDefault();
  }
  keys[e.code] = true;

  if (e.code === 'KeyP' || e.code === 'Escape') {
    if (gameState === STATE.PLAYING) pauseGame();
    else if (gameState === STATE.PAUSED) resumeGame();
  }
  if (e.code === 'Space' && gameState === STATE.START) startGame();
});

document.addEventListener('keyup', e => {
  keys[e.code] = false;
});

// Touch handling
canvas.addEventListener('touchstart', handleTouch, { passive: false });
canvas.addEventListener('touchmove', handleTouch, { passive: false });
canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
canvas.addEventListener('touchcancel', handleTouchEnd, { passive: false });

function handleTouch(e) {
  e.preventDefault();
  initAudio();
  if (e.touches.length === 0) { touchDir = 0; return; }
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const x = touch.clientX - rect.left;
  touchDir = x < rect.width / 2 ? -1 : 1;
}

function handleTouchEnd(e) {
  e.preventDefault();
  if (e.touches.length === 0) touchDir = 0;
}

// Mobile arrow buttons
const leftArrow = document.getElementById('left-arrow');
const rightArrow = document.getElementById('right-arrow');

function setupMobileBtn(el, dir) {
  el.addEventListener('pointerdown', e => {
    e.preventDefault();
    initAudio();
    touchDir = dir;
    el.classList.add('pressed');
  });
  el.addEventListener('pointerup', e => {
    e.preventDefault();
    if (touchDir === dir) touchDir = 0;
    el.classList.remove('pressed');
  });
  el.addEventListener('pointerleave', e => {
    if (touchDir === dir) touchDir = 0;
    el.classList.remove('pressed');
  });
  el.addEventListener('pointercancel', e => {
    if (touchDir === dir) touchDir = 0;
    el.classList.remove('pressed');
  });
}

setupMobileBtn(leftArrow, -1);
setupMobileBtn(rightArrow, 1);

// ─── Button Handlers ──────────────────────
document.getElementById('play-btn').addEventListener('click', () => { playClickSound(); startGame(); });
document.getElementById('again-btn').addEventListener('click', () => { playClickSound(); startGame(); });
document.getElementById('resume-btn').addEventListener('click', () => { playClickSound(); resumeGame(); });
document.getElementById('pause-btn').addEventListener('click', () => { playClickSound(); pauseGame(); });
muteBtn.addEventListener('click', () => { toggleMute(); });

// Auto-pause on visibility change
document.addEventListener('visibilitychange', () => {
  if (document.hidden && gameState === STATE.PLAYING) pauseGame();
});

// Resize handler
window.addEventListener('resize', () => {
  resizeCanvas();
  if (window.innerWidth < 1024 && gameState === STATE.PLAYING) {
    mobileControls.classList.remove('hidden-mobile');
  } else {
    mobileControls.classList.add('hidden-mobile');
  }
});

// ─── Init ─────────────────────────────────
function init() {
  // Load best score
  try { bestScore = parseInt(localStorage.getItem('carDodgerBest')) || 0; } catch(e) { bestScore = 0; }
  bestDisplay.textContent = bestScore;
  startBest.textContent = bestScore;

  resizeCanvas();

  // Initial bush placement
  initBushes();

  // Set player position
  player.x = canvas.width / 2;
  player.y = canvas.height * 0.78;

  // Show appropriate controls
  if (window.innerWidth < 1024) {
    mobileControls.classList.remove('hidden-mobile');
  }

  // Start game loop (renders background on start screen)
  lastTime = performance.now();
  animFrameId = requestAnimationFrame(gameLoop);
}

init();

console.log('🏎️  Car Dodger ready! Use Arrow Keys or A/D to move. Touch left/right on mobile.');
</script>
