<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Car Dodger — Arcade</title>
<style>
/* ═══════════════════════════════════════════════════════════════
   CAR DODGER — Premium Mobile Arcade — Complete Styles
   ═══════════════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a18;--surface:rgba(16,16,36,.88);--text:#e8e8f0;
  --accent:#00d4ff;--purple:#7c3aed;--danger:#ff4757;--gold:#ffd700;--green:#2ed573
}
body{
  background:var(--bg);display:flex;justify-content:center;align-items:center;
  min-height:100vh;min-height:100dvh;
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  overflow:hidden;-webkit-tap-highlight-color:transparent;
  user-select:none;-webkit-user-select:none
}
#game-wrapper{
  position:relative;width:100%;max-width:460px;height:100vh;height:100dvh;max-height:860px;
  display:flex;flex-direction:column;align-items:center;justify-content:center
}
#game-container{
  position:relative;width:100%;height:100%;overflow:hidden;border-radius:18px;
  box-shadow:0 0 80px rgba(0,180,255,.08),0 0 0 1px rgba(255,255,255,.04)
}
canvas{display:block;width:100%;height:100%}
.hidden{display:none!important}.hidden-mobile{display:none!important}

/* ─── Glass Overlay ──────────────────── */
.glass-overlay{
  position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  background:rgba(8,8,22,.82);transition:opacity .35s,visibility .35s
}
.glass-overlay.hidden{display:flex!important;opacity:0;visibility:hidden;pointer-events:none}

/* ─── Select / Main Menu ────────────── */
#select-screen{justify-content:flex-start;padding:12px 10px 16px;gap:6px;overflow-y:auto}
.select-header{text-align:center;flex-shrink:0}
.select-header .logo-img{display:block;width:130px;height:auto;max-width:38%;margin:0 auto 4px;filter:drop-shadow(0 0 18px rgba(0,180,255,.5)) drop-shadow(0 0 32px rgba(120,60,240,.3));animation:logoFloat 3s ease-in-out infinite,logoFadeIn .8s ease-out}
.select-header h1{font-size:1.7em;font-weight:800;background:linear-gradient(135deg,#00d4ff,#7c3aed,#ff4757);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-1px;margin-bottom:2px}
.select-header .subtitle{color:rgba(255,255,255,.35);font-size:.7em;letter-spacing:2px;text-transform:uppercase;margin-bottom:2px}
.char-cards{display:flex;flex-direction:column;gap:6px;width:100%;flex:1;overflow-y:auto;padding:2px 0}
.char-card{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.02);border:2px solid rgba(255,255,255,.05);border-radius:14px;padding:10px;cursor:pointer;transition:border-color .25s,background .25s,transform .2s,box-shadow .25s;flex-shrink:0;backdrop-filter:blur(4px)}
.char-card:hover{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.12);transform:translateY(-2px)}
.char-card:active{transform:scale(.975)}
.char-card.selected{border-color:var(--accent);background:rgba(0,200,255,.05);box-shadow:0 0 28px rgba(0,200,255,.16),inset 0 0 28px rgba(0,200,255,.03);animation:glowPulse 2.2s ease-in-out infinite}
.char-card.selected::after{content:'✓';position:absolute;top:8px;right:10px;width:22px;height:22px;background:var(--accent);color:#0a0a18;font-size:.65em;font-weight:900;border-radius:50%;display:flex;align-items:center;justify-content:center}
.char-car{flex-shrink:0;width:110px;height:60px;border-radius:10px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.char-car-img{width:100%;height:100%;object-fit:contain;transition:filter .3s,transform .3s}
.char-card:hover .char-car-img{transform:scale(1.05)}
.char-card.selected .char-car-img{filter:brightness(1.1) drop-shadow(0 0 6px rgba(0,200,255,.5))}
.char-info{flex:1;min-width:0}
.char-info .char-brand{font-size:.55em;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.3)}
.char-info h3{font-size:.9em;font-weight:800;color:#fff;line-height:1.2}
.char-info .char-model{font-size:.65em;color:rgba(255,255,255,.25);margin-bottom:5px}
.char-stats{display:flex;flex-direction:column;gap:1px}
.stat-row{display:flex;align-items:center;gap:6px}
.stat-icon{font-size:.6em;width:14px;text-align:center;flex-shrink:0}
.stat-label-sm{font-size:.5em;color:rgba(255,255,255,.35);width:48px;flex-shrink:0;text-transform:uppercase;letter-spacing:.5px}
.stat-bar-sm{flex:1;height:3px;background:rgba(255,255,255,.05);border-radius:10px;overflow:hidden}
.stat-fill-sm{height:100%;border-radius:10px;transition:width .5s}
.sf-speed{background:linear-gradient(90deg,#00d4ff,#00e5ff)}
.sf-handling{background:linear-gradient(90deg,#a855f7,#c084fc)}
.sf-accel{background:linear-gradient(90deg,#ffd700,#ffed4a)}
.select-footer{display:flex;gap:8px;width:100%;max-width:340px;flex-shrink:0}
.select-footer .btn-primary{flex:1}

/* ─── Top bar (coins/XP on menu) ────── */
.top-bar{display:flex;justify-content:space-between;align-items:center;width:100%;padding:0 4px;flex-shrink:0}
.top-badge{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:50px;padding:5px 12px;font-size:.7em;font-weight:700;color:#fff}
.top-badge.coins{color:var(--gold)}
.top-badge.xp{color:var(--accent)}

/* ─── Settings ──────────────────────── */
#settings-screen{justify-content:center;padding:24px;gap:18px}
#settings-screen h2{font-size:1.4em;font-weight:800;color:#fff;letter-spacing:1px}
.settings-group{width:100%;max-width:320px;display:flex;flex-direction:column;gap:8px}
.setting-row{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.05);border-radius:14px;padding:10px 14px}
.setting-label{font-size:.85em;font-weight:600;color:#ddd;display:flex;align-items:center;gap:8px}
.setting-icon{font-size:1.1em}
.toggle-switch{position:relative;width:44px;height:26px;background:rgba(255,255,255,.1);border-radius:50px;cursor:pointer;transition:background .3s;flex-shrink:0}
.toggle-switch.on{background:var(--accent)}
.toggle-switch::after{content:'';position:absolute;top:2px;left:2px;width:22px;height:22px;background:#fff;border-radius:50%;transition:transform .25s}
.toggle-switch.on::after{transform:translateX(18px)}

/* ─── Garage Screen ─────────────────── */
#garage-screen{justify-content:flex-start;padding:0;overflow-y:auto}.garage-header{position:sticky;top:0;z-index:2;display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:rgba(10,10,26,.95);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.05)}.garage-header h2{font-size:1.2em;font-weight:800;color:#fff}.garage-grid{display:flex;flex-direction:column;gap:8px;padding:10px 10px 20px;width:100%}.garage-car-card{display:flex;gap:12px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:12px;transition:border-color .25s}.garage-car-card.owned{border-color:rgba(0,200,255,.2)}.garage-car-card.equipped{border-color:var(--accent);background:rgba(0,200,255,.04);box-shadow:0 0 20px rgba(0,200,255,.08)}.garage-preview{flex-shrink:0;width:100px;height:56px;border-radius:10px;overflow:hidden;display:flex;align-items:center;justify-content:center}.garage-preview img{width:100%;height:100%;object-fit:contain}.garage-info{flex:1;min-width:0}.garage-info h3{font-size:.85em;font-weight:800;color:#fff}.garage-info .gstat{font-size:.6em;color:rgba(255,255,255,.35);margin-bottom:4px}.garage-action{margin-top:6px}.btn-sm{padding:6px 16px;font-size:.7em;font-weight:700;border:none;border-radius:50px;cursor:pointer;font-family:inherit;letter-spacing:.5px;text-transform:uppercase;transition:transform .12s,background .2s}.btn-sm:active{transform:scale(.93)}.btn-buy{background:linear-gradient(135deg,#ffd700,#f0a500);color:#1a1a1a}.btn-buy:disabled{opacity:.3;cursor:not-allowed}.btn-select{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.15)}.btn-equipped{background:rgba(0,200,255,.15);color:var(--accent);border:1px solid rgba(0,200,255,.25);cursor:default}.price-tag{font-size:.7em;font-weight:700;color:var(--gold);margin-left:6px}

/* ─── Shop Screen ───────────────────── */
#shop-screen{justify-content:flex-start;padding:0;overflow-y:auto}.shop-header{position:sticky;top:0;z-index:2;display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:rgba(10,10,26,.95);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.05)}.shop-header h2{font-size:1.2em;font-weight:800;color:#fff}.shop-coins{font-size:.85em;font-weight:700;color:var(--gold)}.shop-grid{display:flex;flex-direction:column;gap:8px;padding:10px 10px 20px;width:100%}.shop-item{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.05);border-radius:14px;padding:12px 14px}.shop-item.owned{opacity:.5}.shop-item-label{display:flex;align-items:center;gap:10px;font-size:.85em;color:#ddd;font-weight:600}.shop-item-icon{font-size:1.5em}

/* ─── Countdown ─────────────────────── */
#countdown-overlay{position:absolute;inset:0;z-index:15;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.6);pointer-events:none}.countdown-num{font-size:7em;font-weight:900;color:#fff;text-shadow:0 0 50px rgba(0,212,255,.7);animation:countPop .7s ease-out}.countdown-go{font-size:4em;font-weight:900;color:var(--green);text-shadow:0 0 40px rgba(46,213,115,.7);animation:countPop .7s ease-out}

/* ─── Achievement Toast ─────────────── */
#ach-toast{position:absolute;top:50px;left:50%;transform:translateX(-50%);z-index:20;pointer-events:none;background:rgba(16,16,36,.95);border:2px solid var(--gold);border-radius:14px;padding:12px 18px;display:flex;align-items:center;gap:10px;box-shadow:0 6px 30px rgba(255,215,0,.18);animation:achSlideIn .4s ease-out,achSlideOut .4s 2.4s ease-in forwards}#ach-toast .ach-icon{font-size:1.8em}#ach-toast .ach-text{color:#fff}#ach-toast .ach-text .ach-title{font-weight:800;font-size:.9em}#ach-toast .ach-text .ach-desc{font-size:.65em;color:rgba(255,255,255,.45)}

/* ─── Game Over ─────────────────────── */
#gameover-screen{justify-content:center;align-items:center}#gameover-screen h2{font-size:2.4em;font-weight:900;color:var(--danger);text-shadow:0 0 30px rgba(255,71,87,.5);animation:shakeIn .5s ease-out;margin-bottom:14px}#gameover-screen .final-score{font-size:1em;color:var(--text);margin-bottom:2px}#gameover-screen .final-score span{font-size:2em;font-weight:800;color:#fff;display:block;margin-top:2px}#gameover-screen .new-best{color:var(--gold);font-weight:700;font-size:.9em;margin-bottom:12px;animation:pulse 1s ease-in-out infinite}.go-buttons{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}.go-stats{display:flex;gap:16px;margin-bottom:12px;font-size:.7em;color:rgba(255,255,255,.4)}.go-stats span{color:var(--gold);font-weight:700}

/* ─── Pause ─────────────────────────── */
#pause-screen{justify-content:center;align-items:center}#pause-screen h2{font-size:2em;font-weight:800;color:#fff;margin-bottom:16px;letter-spacing:4px}

/* ─── Daily Reward ──────────────────── */
#daily-screen{justify-content:center;align-items:center;padding:24px;gap:16px}#daily-screen h2{font-size:1.5em;font-weight:800;color:var(--gold)}#daily-screen .daily-rewards{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}#daily-screen .daily-item{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:14px;text-align:center;min-width:80px}#daily-screen .daily-item .d-icon{font-size:2em}#daily-screen .daily-item .d-val{font-size:.8em;font-weight:700;color:#fff;margin-top:4px}

/* ─── Missions Panel ────────────────── */
#missions-screen{justify-content:flex-start;padding:0;overflow-y:auto}.missions-header{position:sticky;top:0;z-index:2;display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:rgba(10,10,26,.95);border-bottom:1px solid rgba(255,255,255,.05)}.missions-header h2{font-size:1.2em;font-weight:800;color:#fff}.mission-card{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.05);border-radius:14px;padding:12px;margin:6px 10px}.mission-card.done{opacity:.5;border-color:var(--green)}.mission-icon{font-size:1.6em;flex-shrink:0}.mission-info{flex:1;min-width:0}.mission-info .m-title{font-size:.8em;font-weight:700;color:#fff}.mission-info .m-progress{font-size:.65em;color:rgba(255,255,255,.4)}.mission-info .m-progress-bar{height:4px;background:rgba(255,255,255,.06);border-radius:10px;overflow:hidden;margin-top:4px}.mission-info .m-progress-fill{height:100%;background:var(--accent);border-radius:10px;transition:width .3s}.mission-reward{font-size:.7em;color:var(--gold);font-weight:700;flex-shrink:0}

/* ─── Buttons ───────────────────────── */
.btn{padding:10px 28px;font-size:.95em;font-weight:700;border:none;border-radius:50px;cursor:pointer;font-family:inherit;letter-spacing:1px;text-transform:uppercase;transition:transform .12s,box-shadow .2s}.btn:active{transform:scale(.94)}.btn-primary{background:linear-gradient(135deg,#00d4ff,#0099cc);color:#fff;box-shadow:0 4px 20px rgba(0,200,255,.25)}.btn-primary:hover{box-shadow:0 6px 28px rgba(0,200,255,.45)}.btn-icon{width:42px;height:42px;padding:0;border-radius:50%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:#fff;font-size:1.1em;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,transform .12s}.btn-icon:active{transform:scale(.9);background:rgba(255,255,255,.12)}.btn-outline{background:rgba(255,255,255,.05);color:#fff;border:1px solid rgba(255,255,255,.12)}.btn-back{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#fff;border-radius:50px;padding:8px 18px;font-size:.8em;font-weight:600;cursor:pointer;font-family:inherit;width:100%;max-width:300px}.btn-back:active{background:rgba(255,255,255,.1)}.btn-nitro-mobile{width:56px;height:56px;border-radius:50%;background:rgba(0,150,255,.15);border:2px solid rgba(0,180,255,.3);color:#fff;font-size:1.4em;font-weight:900;display:none;align-items:center;justify-content:center;pointer-events:auto;transition:background .1s}.btn-nitro-mobile:active{background:rgba(0,180,255,.35)}

/* ─── HUD ──────────────────────────── */
#hud{position:absolute;top:0;left:0;right:0;z-index:5;display:flex;justify-content:space-between;align-items:flex-start;padding:10px 12px;pointer-events:none}#hud>*{pointer-events:auto}.hud-panel{background:rgba(14,14,32,.82);border-radius:10px;padding:6px 12px;border:1px solid rgba(255,255,255,.05);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}.hud-panel .hud-label{font-size:.55em;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,.4)}.hud-panel .hud-value{font-size:1.3em;font-weight:800;color:#fff;line-height:1.1}.hud-panel .hud-sub{font-size:.6em;color:var(--gold);margin-top:1px}.hud-car-tag{font-size:.55em;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1px;margin-left:2px}.hud-btns{display:flex;gap:5px;align-items:flex-start}.hud-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px}.nitro-bar-container{width:80px;height:6px;background:rgba(255,255,255,.08);border-radius:10px;overflow:hidden}.nitro-bar-fill{height:100%;background:linear-gradient(90deg,#00b4ff,#0088ff);border-radius:10px;transition:width .2s}.power-badge{font-size:.65em;padding:2px 8px;border-radius:50px;font-weight:700;animation:pulse .8s ease-in-out infinite}.pb-shield{background:rgba(46,213,115,.2);color:#2ed573;border:1px solid rgba(46,213,115,.3)}.pb-magnet{background:rgba(255,215,0,.2);color:#ffd700;border:1px solid rgba(255,215,0,.3)}.pb-double{background:rgba(168,85,247,.2);color:#a855f7;border:1px solid rgba(168,85,247,.3)}.pb-slow{background:rgba(0,180,255,.2);color:#00d4ff;border:1px solid rgba(0,180,255,.3)}.pb-life{background:rgba(255,71,87,.2);color:#ff4757;border:1px solid rgba(255,71,87,.3)}

/* ─── Leaderboard ───────────────────── */
#leaderboard-screen{justify-content:flex-start;padding:0;overflow-y:auto}.lb-header{position:sticky;top:0;z-index:2;display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:rgba(10,10,26,.95);border-bottom:1px solid rgba(255,255,255,.05)}.lb-header h2{font-size:1.2em;font-weight:800;color:#fff}.lb-list{display:flex;flex-direction:column;gap:4px;padding:8px 10px 20px}.lb-row{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.02);border-radius:10px;padding:8px 12px;font-size:.8em;color:#fff}.lb-row.top1{background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.2)}.lb-rank{font-weight:900;width:28px;text-align:center;color:rgba(255,255,255,.4)}.lb-rank.r1{color:var(--gold)}.lb-rank.r2{color:#c0c0c0}.lb-rank.r3{color:#cd7f32}.lb-score{font-weight:800;margin-left:auto;color:var(--accent)}

/* ─── Mobile ────────────────────────── */
#mobile-controls{position:absolute;bottom:0;left:0;right:0;z-index:6;display:flex;justify-content:space-between;align-items:flex-end;padding:8px 12px 16px;pointer-events:none}#mobile-controls.hidden-mobile{display:none}.mobile-arrow{width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.1);color:rgba(255,255,255,.55);font-size:1.6em;display:flex;align-items:center;justify-content:center;pointer-events:auto;-webkit-tap-highlight-color:transparent;transition:background .1s,border-color .1s}.mobile-arrow:active,.mobile-arrow.pressed{background:rgba(0,200,255,.18);border-color:rgba(0,200,255,.4)}.mobile-center{display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:auto}

/* ─── Animations ────────────────────── */
@keyframes logoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes logoFadeIn{0%{opacity:0;transform:translateY(-12px) scale(.92)}100%{opacity:1;transform:translateY(0) scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 28px rgba(0,200,255,.16),inset 0 0 28px rgba(0,200,255,.03)}50%{box-shadow:0 0 44px rgba(0,200,255,.3),inset 0 0 36px rgba(0,200,255,.06)}}
@keyframes shakeIn{0%{transform:translateX(-8px);opacity:0}15%{transform:translateX(8px)}30%{transform:translateX(-6px)}45%{transform:translateX(6px)}60%{transform:translateX(-3px)}75%{transform:translateX(3px)}90%{transform:translateX(-1px)}100%{transform:translateX(0);opacity:1}}
@keyframes countPop{0%{transform:scale(2.5);opacity:0}30%{transform:scale(.85);opacity:1}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes achSlideIn{0%{transform:translateX(-50%) translateY(-30px);opacity:0}100%{transform:translateX(-50%) translateY(0);opacity:1}}
@keyframes achSlideOut{0%{transform:translateX(-50%) translateY(0);opacity:1}100%{transform:translateX(-50%) translateY(-30px);opacity:0}}

/* ─── Responsive ────────────────────── */
@media(max-width:400px){
  #select-screen{padding:10px 6px 14px}.select-header h1{font-size:1.4em}.logo-img{width:90px!important;max-width:32%!important}
  .char-car{width:90px;height:48px}.char-card{padding:8px;gap:8px}
  .btn{padding:8px 22px;font-size:.85em}.mobile-arrow{width:48px;height:48px;font-size:1.4em}
  #gameover-screen h2{font-size:1.8em}.countdown-num{font-size:5em}.countdown-go{font-size:3em}
  .btn-nitro-mobile{width:48px;height:48px;font-size:1.2em}
}
@media(min-width:1024px){#mobile-controls{display:none}.btn-nitro-mobile{display:none!important}}
</style>
</head>
<body>

<div id="game-wrapper">
  <div id="game-container">
    <canvas id="game"></canvas>

    <!-- HUD -->
    <div id="hud" class="hidden"><div class="hud-panel"><div class="hud-label">Score <span class="hud-car-tag" id="hud-car">· MERCEDES</span></div><div class="hud-value" id="score-display">0</div><div class="hud-sub">🏆 <span id="best-display">0</span> | 💰 <span id="hud-coins">0</span></div></div><div class="hud-right"><div class="hud-btns"><button class="btn-icon" id="mute-btn" title="Sound">🔊</button><button class="btn-icon" id="pause-btn" title="Pause">⏸</button></div><div class="nitro-bar-container" id="nitro-bar-ct"><div class="nitro-bar-fill" id="nitro-bar" style="width:0%"></div></div><div id="power-badges" style="display:flex;gap:3px;flex-wrap:wrap"></div></div></div>

    <!-- Countdown -->

// ═══ AUDIO ═══════════════════════════════════════════════════════
let actx=null,mgain=null,mos=[],mplay=false,mtype='';
function initA(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();if(actx.state==='suspended')actx.resume()}
function stopM(){mos.forEach(o=>{try{o.stop()}catch(e){}});mos=[];mplay=false;mtype=''}
function tone(f,ty,vol,dur,del){if(!actx||!wallet.settings.sfx)return;const t=actx.currentTime+(del||0),o=actx.createOscillator(),g=actx.createGain();o.type=ty;o.frequency.value=f;g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);o.connect(g);g.connect(actx.destination);o.start(t);o.stop(t+dur+.01)}
function playMenuM(){if(!wallet.settings.music||mtype==='menu')return;stopM();initA();if(!actx)return;mgain=actx.createGain();mgain.gain.value=.06;mgain.connect(actx.destination);const n=actx.currentTime;[[261,329,392],[293,349,440],[261,329,392],[246,293,369]].forEach((c,ci)=>{c.forEach(f=>{const o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=f;g.gain.value=0;g.gain.linearRampToValueAtTime(.05,n+ci*2+.3);o.connect(g);g.connect(mgain);o.start(n);o.stop(n+10);mos.push(o)})});mplay=true;mtype='menu'}
function playGameM(){if(!wallet.settings.music||mtype==='game')return;stopM();initA();if(!actx)return;mgain=actx.createGain();mgain.gain.value=.07;mgain.connect(actx.destination);const n=actx.currentTime;[110,110,130.81,130.81,146.83,146.83,130.81,110].forEach((f,i)=>{const o=actx.createOscillator(),g=actx.createGain();o.type='triangle';o.frequency.value=f;g.gain.value=0;g.gain.linearRampToValueAtTime(.07,n+i*.4+.05);o.connect(g);g.connect(mgain);o.start(n);o.stop(n+6);mos.push(o)});for(let i=0;i<32;i++){const o=actx.createOscillator(),g=actx.createGain();o.type='square';o.frequency.value=8000+Math.random()*2000;const t=n+i*.2;g.gain.setValueAtTime(.012,t);g.gain.exponentialRampToValueAtTime(.001,t+.04);o.connect(g);g.connect(mgain);o.start(t);o.stop(t+.04);mos.push(o)}mplay=true;mtype='game'}
function playBossM(){if(!wallet.settings.music)return;stopM();initA();if(!actx)return;mgain=actx.createGain();mgain.gain.value=.09;mgain.connect(actx.destination);const n=actx.currentTime;for(let i=0;i<16;i++){const o=actx.createOscillator(),g=actx.createGain();o.type='sawtooth';o.frequency.value=80+Math.floor(i/4)*20;g.gain.value=0;g.gain.linearRampToValueAtTime(.06,n+i*.5+.05);o.connect(g);g.connect(mgain);o.start(n);o.stop(n+10);mos.push(o)}mplay=true;mtype='boss'}

// ═══ PARTICLES ═══════════════════════════════════════════════════
function spP(x,y,n,c,s){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=60+Math.random()*s;particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:.015+Math.random()*.04,color:c,size:2+Math.random()*4})}}

function initB(){bushes.length=0;for(let i=0;i<12;i++)bushes.push({x:Math.random()<.5?4+Math.random()*(rl-12):rr+8+Math.random()*(canvas.width-rr-12),y:Math.random()*canvas.height,sz:14+Math.random()*22,hue:80+Math.random()*50})}

// ═══ HELPERS ═════════════════════════════════════════════════════
function clamp(v,min,max){return Math.max(min,Math.min(max,v))}
function h2r(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return{r,g,b}}
function lighten(h,a){const{r,g,b}=h2r(h);return`rgb(${[r,g,b].map(c=>Math.min(255,Math.floor(c+(255-c)*a))).join(',')})`}
function darken(h,a){const{r,g,b}=h2r(h);return`rgb(${[r,g,b].map(c=>Math.max(0,Math.floor(c*(1-a)))).join(',')})`}
function rndR(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}

// ═══ DRAWING ═════════════════════════════════════════════════════
function drawWeather(){
  if(weather==='night'){ctx.fillStyle='rgba(5,5,25,.45)';ctx.fillRect(0,0,canvas.width,canvas.height)}
  else if(weather==='rain'){ctx.fillStyle='rgba(10,15,30,.25)';ctx.fillRect(0,0,canvas.width,canvas.height)}
  else if(weather==='fog'){ctx.fillStyle='rgba(160,170,180,.3)';ctx.fillRect(0,0,canvas.width,canvas.height)}
  else if(weather==='snow'){ctx.fillStyle='rgba(200,210,225,.15)';ctx.fillRect(0,0,canvas.width,canvas.height)}
}
function drawRain(dt){
  rainDrops.forEach(d=>{d.y+=d.speed*dt;if(d.y>canvas.height){d.y=-10;d.x=Math.random()*canvas.width}
    ctx.fillStyle=weather==='rain'?'rgba(120,160,220,.5)':'rgba(240,245,255,.7)';
    if(weather==='rain'){ctx.fillRect(d.x,d.y,1,d.size*8)}else{ctx.beginPath();ctx.arc(d.x,d.y,d.size,0,Math.PI*2);ctx.fill()}
  })}
function drawGrass(){
  const g1=ctx.createLinearGradient(0,0,rl,0);g1.addColorStop(0,'#1a3a0a');g1.addColorStop(1,'#2d5a14');ctx.fillStyle=g1;ctx.fillRect(0,0,rl,canvas.height);
  const g2=ctx.createLinearGradient(rr,0,canvas.width,0);g2.addColorStop(0,'#2d5a14');g2.addColorStop(1,'#1a3a0a');ctx.fillStyle=g2;ctx.fillRect(rr,0,canvas.width-rr,canvas.height);
  ctx.fillStyle='rgba(255,255,255,.012)';for(let y=(bo%40);y<canvas.height;y+=40){ctx.fillRect(0,y,rl,15);ctx.fillRect(rr,y,canvas.width-rr,15)}
}
function drawBushes(){bushes.forEach(b=>{const y=((b.y+bo)%(canvas.height+60))-30;ctx.fillStyle='#3d2b1f';ctx.fillRect(b.x-2,y+b.sz*.5,4,b.sz*.5);ctx.fillStyle=`hsl(${b.hue},55%,28%)`;ctx.beginPath();ctx.arc(b.x,y+b.sz*.3,b.sz*.6,0,Math.PI*2);ctx.fill();ctx.fillStyle=`hsl(${b.hue},45%,34%)`;ctx.beginPath();ctx.arc(b.x-b.sz*.2,y+b.sz*.2,b.sz*.4,0,Math.PI*2);ctx.fill()})}
function drawRoad(){

  ctx.fillStyle=wallet.purchasedItems.includes('wheel_gold')?'#d4af37':wallet.purchasedItems.includes('wheel_cyan')?'#00d4ff':wallet.purchasedItems.includes('wheel_red')?'#ff4757':'#666';
  const rW2=wW*.4,rH2=wH*.4;ctx.fillRect(cx+wW*.1,cy+h*.13,rW2,rH2);ctx.fillRect(cx+w-wW*.5,cy+h*.13,rW2,rH2);ctx.fillRect(cx+wW*.1,cy+h*.77,rW2,rH2);ctx.fillRect(cx+w-wW*.5,cy+h*.77,rW2,rH2);
  // Headlights

  // Taillights
  ctx.fillStyle='#ff3333';ctx.fillRect(cx+5,cy+h-7,w*.18,5);ctx.fillRect(cx+w-5-w*.18,cy+h-7,w*.18,5);
  // Neon underglow
  if(wallet.purchasedItems.includes('neon_blue')){ctx.shadowColor='#00d4ff';ctx.shadowBlur=12;ctx.strokeStyle='rgba(0,212,255,.5)';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(cx+4,cy+h-3);ctx.lineTo(cx+w-4,cy+h-3);ctx.stroke();ctx.shadowBlur=0}
  else if(wallet.purchasedItems.includes('neon_red')){ctx.shadowColor='#ff4757';ctx.shadowBlur=12;ctx.strokeStyle='rgba(255,71,87,.5)';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(cx+4,cy+h-3);ctx.lineTo(cx+w-4,cy+h-3);ctx.stroke();ctx.shadowBlur=0}
  else if(wallet.purchasedItems.includes('neon_gold')){ctx.shadowColor='#ffd700';ctx.shadowBlur=12;ctx.strokeStyle='rgba(255,215,0,.5)';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(cx+4,cy+h-3);ctx.lineTo(cx+w-4,cy+h-3);ctx.stroke();ctx.shadowBlur=0}
  // Spoiler
  if(wallet.purchasedItems.includes('spoiler_carbon')){ctx.fillStyle='#222';ctx.fillRect(cx+w*.15,cy-3,w*.7,4);ctx.fillStyle='#444';ctx.fillRect(cx+w*.2,cy-5,w*.6,3)}

function drawCoin(x,y,r,pulse){
  const sc=1+Math.sin(pulse*4)*.08;ctx.save();ctx.translate(x,y);ctx.scale(sc,sc);ctx.shadowColor='#ffd700';ctx.shadowBlur=12;

  ctx.fillStyle='#8b6914';ctx.font=`bold ${r*1.1}px "Segoe UI",sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('$',0,1);ctx.restore();

function drawParticles(){particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill()});ctx.globalAlpha=1}
function drawNitroFlames(){
  if(!nitroActive)return;
  const cx=pl.x-epw/2,cy=pl.y+eph/2;ctx.fillStyle=wallet.purchasedItems.includes('nitro_purple')?'#a855f7':wallet.purchasedItems.includes('nitro_rainbow')?`hsl(${performance.now()/10%360},100%,60%)`:'#00b4ff';

  ctx.fillStyle='rgba(255,255,255,.6)';ctx.beginPath();ctx.arc(cx+epw*.5,cy+2,3+Math.random()*4,0,Math.PI*2);ctx.fill();

// ═══ SPAWNING ════════════════════════════════════════════════════
function spE(isPolice,isBoss){
  const lane=Math.floor(Math.random()*3);let x=rl+lw*lane+lw/2;
  if(isBoss){x=rl+rw/2}const w=isBoss?pw*2.2:isPolice?pw*1.1:pw*(.75+Math.random()*.35),h=w*1.85;
  enemies.push({x,y:-h,w,h,color:isPolice?'#111':isBoss?'#444':ENEMY_COLORS[Math.floor(Math.random()*ENEMY_COLORS.length)],speed:ebs*(.75+Math.random()*.5)*(isPolice?1.4:1)*(isBoss?.6:1),lane,changing:false,changeTimer:Math.random()*3,police:!!isPolice,boss:!!isBoss})
}
function spC(){
  let x,a=0;do{x=rl+20+Math.random()*(rw-40);a++}while(a<10&&enemies.some(e=>Math.abs(e.x-x)<pw*1.2&&e.y<80&&e.y>-80));
  coins.push({x,y:-20,radius:Math.max(8,pw*.18),pulse:Math.random()*Math.PI*2})
}

// ═══ POWER-UPS ═══════════════════════════════════════════════════
const PU_TYPES=[{type:'shield',icon:'🛡',color:'#2ed573',dur:8,chance:.03},{type:'magnet',icon:'🧲',color:'#ffd700',dur:6,chance:.04},{type:'double',icon:'x2',color:'#a855f7',dur:10,chance:.03},{type:'slow',icon:'⏳',color:'#00d4ff',dur:5,chance:.03},{type:'life',icon:'❤️',color:'#ff4757',dur:0,chance:.02}];
function spPU(){
  const x=rl+30+Math.random()*(rw-60);const type=PU_TYPES[Math.floor(Math.random()*PU_TYPES.length)];
  if(Math.random()<type.chance)powerups.push({x,y:-30,radius:14,type:type.type,color:type.color,icon:type.icon,pulse:0})
}
function collectPU(pu){
  if(pu.type==='life'){activePowers.life=(activePowers.life||0)+1;sfxPowerUp();spP(pu.x,pu.y,20,pu.color,100)}
  else{activePowers[pu.type]=(activePowers[pu.type]||0)+pu.dur;sfxPowerUp();spP(pu.x,pu.y,15,pu.color,100)}
  updatePowerBadges()
}
function updatePowerBadges(){
  const b=$('power-badges');let h='';if(activePowers.shield>0)h+=`<span class="power-badge pb-shield">🛡 ${Math.ceil(activePowers.shield)}s</span>`;if(activePowers.magnet>0)h+=`<span class="power-badge pb-magnet">🧲 ${Math.ceil(activePowers.magnet)}s</span>`;if(activePowers.double>0)h+=`<span class="power-badge pb-double">x2 ${Math.ceil(activePowers.double)}s</span>`;if(activePowers.slow>0)h+=`<span class="power-badge pb-slow">⏳ ${Math.ceil(activePowers.slow)}s</span>`;if(activePowers.life>0)h+=`<span class="power-badge pb-life">❤️ x${activePowers.life}</span>`;b.innerHTML=h;
}

// ═══ COUNTDOWN ═══════════════════════════════════════════════════
function startCD(){gs=ST.COUNTDOWN;cdv=3;cdt=0;$('select-screen').classList.add('hidden');$('gameover-screen').classList.add('hidden');$('pause-screen').classList.add('hidden');$('hud').classList.remove('hidden');resetG();upDim();updateCharUI();pickWeather();const cd=$('countdown-overlay');cd.classList.remove('hidden');cd.innerHTML='<span class="countdown-num">3</span>';sfxBeep();updateHUDCoins()}
function upCD(dt){cdt+=dt;const nv=4-Math.ceil(cdt);if(nv!==cdv&&nv>=0){cdv=nv;const cd=$('countdown-overlay');if(cdv>0){cd.innerHTML=`<span class="countdown-num">${cdv}</span>`;sfxBeep()}else{cd.innerHTML='<span class="countdown-go">GO!</span>';sfxGo()}}if(cdt>=4){$('countdown-overlay').classList.add('hidden');gs=ST.PLAYING;rt=0;playGameM();if(window.innerWidth<1024){$('mobile-controls').classList.remove('hidden-mobile');$('nitro-mobile-btn').style.display='flex'}}}

// ═══ UPDATE ══════════════════════════════════════════════════════
function update(dt){
  if(gs===ST.COUNTDOWN){upCD(dt);return}if(gs!==ST.PLAYING)return;
  rt+=dt;weatherTimer+=dt;const el=score*.015;
  // Difficulty
  ebs=canvas.height*(.35+el*.025)*(1+diff*.15);if(ebs>canvas.height*1.5)ebs=canvas.height*1.5;
  const spI=Math.max(.35,1.5-el*.04);score+=ebs*dt*.012*(activePowers.double>0?2:1);
  spT+=dt;if(spT>=spI){spT=0;spE();if(Math.random()<.15+el*.02)spE();runAv++}
  // Police
  policeCooldown-=dt;if(!policeActive&&policeCooldown<=0&&Math.random()<.002+el*.001){policeActive=true;policeTimer=5+Math.random()*5;policeCooldown=20;playPoliceM();spE(true);spE(true)}
  if(policeActive){policeTimer-=dt;if(policeTimer<=0){policeActive=false;playGameM()}else if(Math.random()<.01)spE(true)}
  // Boss
  if(score>=bossScore&&!bossSpawned){bossSpawned=true;bossScore+=1000;spE(false,true);playBossM();setTimeout(()=>{if(gs===ST.PLAYING)playGameM()},6000)}
  if(score>=bossScore-500)bossSpawned=false;
  // Power-up spawn
  if(Math.random()<.008)spPU();
  // Coin spawn
  csT+=dt;if(csT>=1.5+Math.random()*2.5){csT=0;if(Math.random()<.65)spC()}
  // Scroll
  ro+=ebs*dt;bo+=ebs*dt*.8;
  // Enemies
  for(let i=enemies.length-1;i>=0;i--){const e=enemies[i];e.changeTimer-=dt;if(e.changeTimer<=0&&!e.boss){e.changeTimer=2+Math.random()*4;if(Math.random()<.35){const nl=Math.floor(Math.random()*3);e.x=rl+lw*nl+lw/2;e.lane=nl}}e.y+=e.speed*dt;if(e.y>canvas.height+e.h){enemies.splice(i,1);wallet.totalAvoids++;runAv++}}
  // Coins
  const st=getSt(wallet.selectedCar);const magMul=activePowers.magnet>0?st.magnetMul*1.5:st.magnetMul;
  for(let i=coins.length-1;i>=0;i--){const c=coins[i];c.y+=ebs*dt*(activePowers.slow>0?.5:1);c.pulse+=dt;if(c.y>canvas.height+c.radius){coins.splice(i,1);continue}const dx=Math.abs(c.x-pl.x),dy=Math.abs(c.y-pl.y),colR=c.radius*magMul;if(dx<(epw/2+colR-2)&&dy<(eph/2+colR-2)){score+=10*(activePowers.double>0?2:1);wallet.coins++;wallet.totalCoins++;runCoins++;sfxCoin();spP(c.x,c.y,12,'#ffd700',120);coins.splice(i,1)}}
  // Power-ups
  for(let i=powerups.length-1;i>=0;i--){const p=powerups[i];p.y+=ebs*dt*(activePowers.slow>0?.5:1);p.pulse+=dt;if(p.y>canvas.height+p.radius){powerups.splice(i,1);continue}const dx=Math.abs(p.x-pl.x),dy=Math.abs(p.y-pl.y);if(dx<epw/2+p.radius&&dy<eph/2+p.radius){collectPU(p);powerups.splice(i,1)}}
  // Active powers
  ['shield','magnet','double','slow'].forEach(k=>{if(activePowers[k]>0){activePowers[k]-=dt;if(activePowers[k]<=0)delete activePowers[k]}});updatePowerBadges();
  // Collision
  for(const e of enemies){const dx=Math.abs(e.x-pl.x),dy=Math.abs(e.y-pl.y);if(dx<(epw+e.w)/2-8&&dy<(eph+e.h)/2-10){if(activePowers.shield>0){delete activePowers.shield;sfxPowerUp();spP(pl.x,pl.y,25,'#2ed573',150);enemies.splice(enemies.indexOf(e),1);updatePowerBadges();continue}if(activePowers.life>0){activePowers.life--;spP(pl.x,pl.y,25,'#ff4757',150);enemies.splice(enemies.indexOf(e),1);updatePowerBadges();if(activePowers.life<=0)delete activePowers.life;continue}triggerGO();return}}
  // Particles
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=p.decay;if(p.life<=0)particles.splice(i,1)}
  // Nitro
  if(!nitroActive){nitro=Math.min(nitroMax,nitro+dt*8)}else{nitroDur-=dt;nitro=Math.max(0,nitroDur*33);if(nitroDur<=0)nitroActive=false}
  // Update nitro bar
  $('nitro-bar').style.width=(nitro/nitroMax*100)+'%';
  // Screen shake
  if(shake>0)shake=Math.max(0,shake-dt*2.5);
  // Score display
  $('score-display').textContent=Math.floor(score);
  // Weather particles
  if(weather==='rain'||weather==='snow'){rainDrops.forEach(d=>{d.y+=d.speed*dt;if(d.y>canvas.height){d.y=-10;d.x=Math.random()*canvas.width}})}
}

function moveP(dt){if(gs!==ST.PLAYING)return;let dx=0;if(keys['ArrowLeft']||keys['KeyA'])dx=-1;if(keys['ArrowRight']||keys['KeyD'])dx=1;if(td!==0)dx=td;const sp=ps*getSt(wallet.selectedCard||wallet.selectedCar).speedMul*(nitroActive?1.5:1);pl.x+=dx*sp*dt;pl.x=clamp(pl.x,rl+epw/2,rr-epw/2)}

function activateNitro(){if(nitro<30||nitroActive||gs!==ST.PLAYING)return;nitroActive=true;nitroDur=3;nitro=nitroMax;wallet.nitroUses++;runNitro++;sfxNitro()}

// ═══ GAME OVER ═══════════════════════════════════════════════════
function triggerGO(){gs=ST.GAMEOVER;stopM();sfxCrash();shake=.4;spP(pl.x,pl.y,35,'#ff4757',220);spP(pl.x,pl.y,20,'#ffa502',180);
  const fs=Math.floor(score);if(fs>wallet.bestScore){wallet.bestScore=fs;isNB=true;try{localStorage.setItem('carDodgerBest',fs)}catch(e){}}if(rt>wallet.longestTime)wallet.longestTime=Math.floor(rt);
  wallet.gamesPlayed++;const earnedCoins=runCoins+Math.floor(fs/20);const earnedXP=Math.floor(fs/10)+runCoins;wallet.coins+=earnedCoins;wallet.xp+=earnedXP;
  // Mission progress
  const mp=wallet.missionProgress;mp.coins=(mp.coins||0)+runCoins;mp.score=Math.max(mp.score||0,fs);mp.games=(mp.games||0)+1;mp.avoids=(mp.avoids||0)+runAv;mp.nitroUses=(mp.nitroUses||0)+runNitro;
  // Leaderboard
  addLB(fs);
  save();checkDaily();checkAch();checkMissions();
  setTimeout(()=>{$('final-score').textContent=fs;$('go-coins').textContent=earnedCoins;$('go-xp').textContent=earnedXP;newBestEl.classList.toggle('hidden',!isNB);$('gameover-screen').classList.remove('hidden');$('hud').classList.add('hidden');updateMenuBar()},500)}
function resetG(){enemies.length=0;coins.length=0;particles.length=0;powerups.length=0;activePowers={};score=0;isNB=false;rt=0;runAv=0;runCoins=0;runNitro=0;nitro=nitroMax;nitroActive=false;nitroDur=0;ebs=canvas.height*.35;spT=0;csT=0;shake=0;ro=0;bo=0;bossSpawned=false;bossScore=1000;policeActive=false;policeTimer=0;policeCooldown=10;pl.x=canvas.width/2;$('score-display').textContent='0';$('best-display').textContent=wallet.bestScore;$('nitro-bar').style.width='100%';updatePowerBadges();updateHUDCoins()}
function startG(){initA();if(!actx)initA();startCD();save()}
function pauseG(){if(gs!==ST.PLAYING)return;gs=ST.PAUSED;stopM();$('pause-screen').classList.remove('hidden')}
function resumeG(){if(gs!==ST.PAUSED)return;gs=ST.PLAYING;$('pause-screen').classList.add('hidden');lt=performance.now();playGameM()}
function backToSel(){stopM();gs=ST.SELECT;$('gameover-screen').classList.add('hidden');$('pause-screen').classList.add('hidden');$('hud').classList.add('hidden');$('countdown-overlay').classList.add('hidden');$('select-screen').classList.remove('hidden');updateCharUI();updateMenuBar();renderGarage();renderShop();playMenuM()}

// ═══ LEADERBOARD ═════════════════════════════════════════════════
function getLB(){try{return JSON.parse(localStorage.getItem('carDodgerLB'))||[]}catch(e){return[]}}
function addLB(s){const lb=getLB();lb.push({score:s,date:Date.now()});lb.sort((a,b)=>b.score-a.score);if(lb.length>10)lb.length=10;try{localStorage.setItem('carDodgerLB',JSON.stringify(lb))}catch(e){}}

function checkMissions(){const today=new Date().toDateString();if(wallet.missionDate!==today){wallet.missionDate=today;wallet.missionProgress={}}const mp=wallet.missionProgress;MISSION_DEFS.forEach(m=>{if(mp[m.track]>=m.goal&&!mp[m.id+'_done']){mp[m.id+'_done']=true;wallet.coins+=m.reward;showToast(m.icon,`Mission Complete! +${m.reward} coins`)}});save()}
function renderMissions(){const mp=wallet.missionProgress||{};$('missions-list').innerHTML=MISSION_DEFS.map(m=>{const prog=mp[m.track]||0,pct=Math.min(100,Math.round(prog/m.goal*100)),done=mp[m.id+'_done'];return`<div class="mission-card ${done?'done':''}"><span class="mission-icon">${m.icon}</span><div class="mission-info"><div class="m-title">${m.desc}</div><div class="m-progress">${prog}/${m.goal}</div><div class="m-progress-bar"><div class="m-progress-fill" style="width:${done?100:pct}%"></div></div></div><span class="mission-reward">💰${m.reward}</span></div>`}).join('')}

// ═══ ACHIEVEMENTS ════════════════════════════════════════════════
function checkAch(){ACHIEVEMENTS.forEach(a=>{if(!wallet.unlockedAch.includes(a.id)&&a.check({totalCoins:wallet.totalCoins,bestScore:wallet.bestScore,longestTime:wallet.longestTime,gamesPlayed:wallet.gamesPlayed,ownedCars:wallet.ownedCars})){wallet.unlockedAch.push(a.id);save();showAchToast(a)}})}
function showAchToast(a){sfxAch();const t=$('ach-toast');t.querySelector('.ach-icon').textContent=a.icon;t.querySelector('.ach-title').textContent=a.name;t.querySelector('.ach-desc').textContent=a.desc;t.classList.remove('hidden');t.style.animation='none';t.offsetHeight;t.style.animation='achSlideIn .4s ease-out, achSlideOut .4s 2.4s ease-in forwards';setTimeout(()=>t.classList.add('hidden'),2900)}

// ═══ TOAST ═══════════════════════════════════════════════════════
function showToast(icon,msg){const t=$('ach-toast');t.querySelector('.ach-icon').textContent=icon;t.querySelector('.ach-title').textContent=msg;t.querySelector('.ach-desc').textContent='';t.classList.remove('hidden');t.style.animation='none';t.offsetHeight;t.style.animation='achSlideIn .4s ease-out, achSlideOut .4s 2s ease-in forwards';setTimeout(()=>t.classList.add('hidden'),2500)}

// ═══ RENDER ══════════════════════════════════════════════════════
function render(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // Weather background
  if(weather==='night'){ctx.fillStyle='#050519';ctx.fillRect(0,0,canvas.width,canvas.height)}
  else if(weather==='rain'){ctx.fillStyle='#0a0f1e';ctx.fillRect(0,0,canvas.width,canvas.height)}
  else if(weather==='snow'){ctx.fillStyle='#c8d2e1';ctx.fillRect(0,0,canvas.width,canvas.height)}
  else{const sky=ctx.createLinearGradient(0,0,0,canvas.height);sky.addColorStop(0,'#0a0a1e');sky.addColorStop(1,'#1a1a2e');ctx.fillStyle=sky;ctx.fillRect(0,0,canvas.width,canvas.height)}
  // Fog overlay
  if(weather==='fog'){ctx.fillStyle='rgba(170,180,190,.35)';ctx.fillRect(0,0,canvas.width,canvas.height)}

  ctx.save();if(shake>0){const i=shake*10;ctx.translate((Math.random()-.5)*i*2,(Math.random()-.5)*i*2);ctx.globalAlpha=nitroActive?.9:1}
  drawGrass();drawBushes();drawRoad();
  // Weather effects
  if(weather==='rain'||weather==='snow')drawRain(.016);
  // Power-ups
  powerups.forEach(p=>{const sc=1+Math.sin(p.pulse*3)*.1;ctx.save();ctx.translate(p.x,p.y);ctx.scale(sc,sc);ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=10;ctx.beginPath();ctx.arc(0,0,p.radius,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.fillStyle='#fff';ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(p.icon,0,1);ctx.restore()});
  // Coins
  coins.forEach(c=>drawCoin(c.x,c.y,c.radius,c.pulse));
  // Enemies
  enemies.forEach(e=>drawCar(e.x,e.y,e.w,e.h,e.color,null,false,e.police,e.boss));
  // Player
  if(gs!==ST.SELECT&&gs!==ST.COUNTDOWN){const ch=getSel();drawCar(pl.x,pl.y,epw,eph,ch.color,ch.accent,true);drawNitroFlames()}
  // Shield effect
  if(activePowers.shield>0){ctx.strokeStyle='rgba(46,213,115,.5)';ctx.lineWidth=3;ctx.shadowColor='#2ed573';ctx.shadowBlur=12;ctx.beginPath();ctx.arc(pl.x,pl.y,epw*.8,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0}
  drawParticles();ctx.restore();
}

// ═══ GAME LOOP ═══════════════════════════════════════════════════
function loop(ts){afid=requestAnimationFrame(loop);if(lt===0)lt=ts;let dt=(ts-lt)/1000;lt=ts;if(dt>.15)dt=.15;moveP(dt);update(dt);render()}

// ═══ UI HELPERS ══════════════════════════════════════════════════
function updateCharUI(){
  const cards=$('char-cards');cards.innerHTML=ALL_CARS.map(c=>{
    const owned=wallet.ownedCars.includes(c.id),equipped=wallet.selectedCar===c.id;
    const s=c.stats;return`<div class="char-card${equipped?' selected':''}${!owned?' locked':''}" data-char="${c.id}"><div class="char-car"><img src="${c.img}" alt="${c.name}" class="char-car-img"></div><div class="char-info"><div class="char-brand">${c.brand}</div><h3>${c.name}${!owned?' 🔒':''}</h3><div class="char-model">${c.price>0?'💰'+c.price:'Free'}</div><div class="char-stats"><div class="stat-row"><span class="stat-icon">⚡</span><span class="stat-label-sm">Speed</span><div class="stat-bar-sm"><div class="stat-fill-sm sf-speed" style="width:${s.speed}%"></div></div></div><div class="stat-row"><span class="stat-icon">🎯</span><span class="stat-label-sm">Handling</span><div class="stat-bar-sm"><div class="stat-fill-sm sf-handling" style="width:${s.handling}%"></div></div></div><div class="stat-row"><span class="stat-icon">🚀</span><span class="stat-label-sm">Accel</span><div class="stat-bar-sm"><div class="stat-fill-sm sf-accel" style="width:${s.accel}%"></div></div></div></div></div></div>`}).join('');
  cards.querySelectorAll('.char-card').forEach(card=>{card.addEventListener('click',()=>{initA();const id=card.dataset.char;if(!wallet.ownedCars.includes(id)){showToast('🔒','Buy this car in the Garage!');return}sfxClick();wallet.selectedCar=id;save();updateCharUI();renderGarage()})});
  $('hud-car').textContent='· '+getSel().short;
}
function updateMenuBar(){$('menu-coins').textContent=wallet.coins;$('menu-xp').textContent=wallet.xp;$('menu-rank').textContent=getRank().icon+' '+getRank().name}
function updateHUDCoins(){$('hud-coins').textContent=wallet.coins}
function updateAllCoinDisplays(){updateMenuBar();updateHUDCoins();const gc=$('garage-coins');if(gc)gc.textContent=wallet.coins;const sc=$('shop-coins-display');if(sc)sc.textContent=wallet.coins}

// ═══ GARAGE ══════════════════════════════════════════════════════
function renderGarage(){
  const grid=$('garage-grid');if(!grid)return;$('garage-coins').textContent=wallet.coins;
  grid.innerHTML=ALL_CARS.map(c=>{
    const owned=wallet.ownedCars.includes(c.id),eq=wallet.selectedCar===c.id;
    return`<div class="garage-car-card${owned?' owned':''}${eq?' equipped':''}"><div class="garage-preview"><img src="${c.img}" alt="${c.name}"></div><div class="garage-info"><h3>${c.brand} ${c.name}</h3><div class="gstat">⚡${c.stats.speed} 🎯${c.stats.handling} 🚀${c.stats.accel}</div><div class="garage-action">${eq?'<button class="btn-sm btn-equipped">✓ Equipped</button>':owned?`<button class="btn-sm btn-select" data-act="select" data-id="${c.id}">Select</button>`:`<button class="btn-sm btn-buy" data-act="buy" data-id="${c.id}" ${wallet.coins<c.price?'disabled':''}>Buy</button><span class="price-tag">💰${c.price}</span>`}</div></div></div>`}).join('');
  grid.querySelectorAll('[data-act="buy"]').forEach(b=>{b.addEventListener('click',e=>{e.stopPropagation();const id=b.dataset.id,c=getC(id);if(wallet.coins>=c.price){wallet.coins-=c.price;wallet.ownedCars.push(id);wallet.selectedCar=id;save();updateCharUI();updateAllCoinDisplays();renderGarage();showToast('🎉',c.name+' purchased!');checkAch()}else{showToast('💰','Not enough coins!')}})});
  grid.querySelectorAll('[data-act="select"]').forEach(b=>{b.addEventListener('click',e=>{e.stopPropagation();wallet.selectedCar=b.dataset.id;save();updateCharUI();renderGarage();showToast('✅','Car equipped!')})});
}

// ═══ SHOP ════════════════════════════════════════════════════════
function renderShop(){
  const grid=$('shop-grid');if(!grid)return;$('shop-coins-display').textContent=wallet.coins;
  grid.innerHTML=SHOP_ITEMS.map(item=>{const owned=wallet.purchasedItems.includes(item.id);return`<div class="shop-item${owned?' owned':''}"><span class="shop-item-label"><span class="shop-item-icon">${item.icon}</span>${item.name}<span style="font-size:.65em;color:rgba(255,255,255,.3);margin-left:6px">${item.cat}</span></span>${owned?'<span class="btn-sm btn-equipped">Owned</span>':`<button class="btn-sm btn-buy" data-shop="${item.id}" ${wallet.coins<item.price?'disabled':''}>💰${item.price}</button>`}</div>`}).join('');
  grid.querySelectorAll('[data-shop]').forEach(b=>{b.addEventListener('click',()=>{const id=b.dataset.shop,item=SHOP_ITEMS.find(i=>i.id===id);if(wallet.coins>=item.price){wallet.coins-=item.price;wallet.purchasedItems.push(id);save();updateAllCoinDisplays();renderShop();showToast('🛒',item.name+' purchased!')}else{showToast('💰','Not enough coins!')}})});
}

// ═══ SETTINGS ════════════════════════════════════════════════════
function applySetUI(){$('toggle-music').classList.toggle('on',wallet.settings.music);$('toggle-sfx').classList.toggle('on',wallet.settings.sfx);$('mute-btn').textContent=wallet.settings.sfx?'🔊':'🔇';if(!wallet.settings.music)stopM()}

// ═══ INPUT ═══════════════════════════════════════════════════════
let td=0;
document.addEventListener('keydown',e=>{if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','KeyA','KeyD','Space','KeyP','Escape'].includes(e.code))e.preventDefault();keys[e.code]=true;if(e.code==='KeyP'||e.code==='Escape'){if(gs===ST.PLAYING)pauseG();else if(gs===ST.PAUSED)resumeG()}if(e.code==='Space'){if(gs===ST.SELECT)startG();else if(gs===ST.GAMEOVER)startG();else if(gs===ST.PLAYING)activateNitro()}});
document.addEventListener('keyup',e=>{keys[e.code]=false});
canvas.addEventListener('touchstart',e=>{e.preventDefault();initA();if(e.touches.length===0){td=0;return}td=(e.touches[0].clientX-canvas.getBoundingClientRect().left)<canvas.getBoundingClientRect().width/2?-1:1},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();if(e.touches.length===0){td=0;return}td=(e.touches[0].clientX-canvas.getBoundingClientRect().left)<canvas.getBoundingClientRect().width/2?-1:1},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();if(e.touches.length===0)td=0},{passive:false});
canvas.addEventListener('touchcancel',e=>{e.preventDefault();td=0},{passive:false});
function setupMB(el,dir){el.addEventListener('pointerdown',e=>{e.preventDefault();initA();td=dir;el.classList.add('pressed')});el.addEventListener('pointerup',e=>{e.preventDefault();if(td===dir)td=0;el.classList.remove('pressed')});el.addEventListener('pointerleave',e=>{if(td===dir)td=0;el.classList.remove('pressed')});el.addEventListener('pointercancel',e=>{if(td===dir)td=0;el.classList.remove('pressed')})}
setupMB($('left-arrow'),-1);setupMB($('right-arrow'),1);
$('nitro-mobile-btn').addEventListener('pointerdown',e=>{e.preventDefault();activateNitro()});

// ═══ BUTTON HANDLERS ═════════════════════════════════════════════
$('start-race-btn').addEventListener('click',()=>{sfxClick();startG()});
$('again-btn').addEventListener('click',()=>{sfxClick();startG()});
$('change-car-btn').addEventListener('click',()=>{sfxClick();backToSel()});
$('resume-btn').addEventListener('click',()=>{sfxClick();resumeG()});
$('pause-btn').addEventListener('click',()=>{sfxClick();pauseG()});
$('mute-btn').addEventListener('click',()=>{wallet.settings.sfx=!wallet.settings.sfx;save();applySetUI()});
$('daily-claim-btn').addEventListener('click',()=>{sfxClick();claimDaily()});
$('settings-btn').addEventListener('click',()=>{sfxClick();$('select-screen').classList.add('hidden');$('settings-screen').classList.remove('hidden')});
$('settings-back-btn').addEventListener('click',()=>{sfxClick();$('settings-screen').classList.add('hidden');$('select-screen').classList.remove('hidden')});
$('toggle-music').addEventListener('click',function(){wallet.settings.music=!wallet.settings.music;save();applySetUI()});
$('toggle-sfx').addEventListener('click',function(){wallet.settings.sfx=!wallet.settings.sfx;save();applySetUI()});
$('toggle-fs').addEventListener('click',function(){if(!document.fullscreenElement){$('game-wrapper').requestFullscreen().catch(()=>{});this.classList.add('on')}else{document.exitFullscreen();this.classList.remove('on')}});
document.addEventListener('fullscreenchange',()=>{$('toggle-fs').classList.toggle('on',!!document.fullscreenElement)});
// Garage
$('garage-btn').addEventListener('click',()=>{sfxClick();renderGarage();$('select-screen').classList.add('hidden');$('garage-screen').classList.remove('hidden')});
$('garage-back-btn').addEventListener('click',()=>{sfxClick();$('garage-screen').classList.add('hidden');$('select-screen').classList.remove('hidden');updateCharUI();updateMenuBar()});
// Shop
$('shop-btn').addEventListener('click',()=>{sfxClick();renderShop();$('select-screen').classList.add('hidden');$('shop-screen').classList.remove('hidden')});
$('shop-back-btn').addEventListener('click',()=>{sfxClick();$('shop-screen').classList.add('hidden');$('select-screen').classList.remove('hidden')});
// Missions
$('missions-btn').addEventListener('click',()=>{sfxClick();renderMissions();$('select-screen').classList.add('hidden');$('missions-screen').classList.remove('hidden')});
$('missions-back-btn').addEventListener('click',()=>{sfxClick();$('missions-screen').classList.add('hidden');$('select-screen').classList.remove('hidden')});
// Leaderboard
$('lb-btn').addEventListener('click',()=>{sfxClick();renderLB();$('select-screen').classList.add('hidden');$('leaderboard-screen').classList.remove('hidden')});
$('lb-back-btn').addEventListener('click',()=>{sfxClick();$('leaderboard-screen').classList.add('hidden');$('select-screen').classList.remove('hidden')});

// ═══ LIFECYCLE ═══════════════════════════════════════════════════
document.addEventListener('visibilitychange',()=>{if(document.hidden&&gs===ST.PLAYING)pauseG()});
window.addEventListener('resize',()=>{rz();if(window.innerWidth<1024&&gs===ST.PLAYING){$('mobile-controls').classList.remove('hidden-mobile');$('nitro-mobile-btn').style.display='flex'}else{$('mobile-controls').classList.add('hidden-mobile');$('nitro-mobile-btn').style.display='none'}});

// ═══ INIT ════════════════════════════════════════════════════════
function init(){
  load();applySetUI();updateCharUI();updateMenuBar();
  $('best-display').textContent=wallet.bestScore;
  rz();initB();pl.x=canvas.width/2;pl.y=canvas.height*.78;
  if(window.innerWidth<1024){$('mobile-controls').classList.remove('hidden-mobile');$('nitro-mobile-btn').style.display='flex'}
  lt=performance.now();afid=requestAnimationFrame(loop);
  initA();if(wallet.settings.music)playMenuM();
  checkDaily();console.log('🏎️ Car Dodger Premium ready!');
}
init();
</script>
